services:
  postgres-dw:
    image: postgres:18-alpine
    container_name: alfamaq_postgres_dw
    restart: always
    environment:
      POSTGRES_DB: alfamaq_dw
      POSTGRES_USER: alfamaq_admin
      POSTGRES_PASSWORD: alfamaq_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d
    networks:
      - dw-network

networks:
  dw-network:
    driver: bridge

volumes:
  pgdata:
    driver: local
